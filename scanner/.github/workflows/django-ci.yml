name: Django CI Pipeline

# 1. WHEN SHOULD THIS RUN?
on:
  push:
    branches: [ "main" ] # Runs every time you push to the main branch
  pull_request:
    branches: [ "main" ]

# 2. WHAT SHOULD IT DO?
jobs:
  build-and-test:
    runs-on: ubuntu-latest # GitHub boots up a temporary Linux computer

    steps:
    # Step A: Download your code from the repository
    - name: Checkout Code
      uses: actions/checkout@v3

    # Step B: Install Python on the temporary computer
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    # Step C: Install your project requirements
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install django psycopg2-binary celery redis
        # Or if you have a requirements file: pip install -r requirements.txt

    # Step D: Run a basic system check to make sure Django doesn't crash
    - name: Run Django System Check
      run: |
        python manage.py check