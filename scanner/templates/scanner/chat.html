<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Contact Assistant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        #chat-box { height: 400px; overflow-y: auto; background: white; border-radius: 8px; padding: 20px; border: 1px solid #dee2e6; position: relative; }
        .user-msg { background-color: #0d6efd; color: white; padding: 10px 15px; border-radius: 15px 15px 0px 15px; max-width: 75%; align-self: flex-end; margin-bottom: 10px; }
        .ai-msg { background-color: #e9ecef; color: black; padding: 10px 15px; border-radius: 15px 15px 15px 0px; max-width: 75%; align-self: flex-start; margin-bottom: 10px; }
        
        /* Typing Indicator Styles */
        .typing-indicator {
            display: none; /* Hidden by default */
            align-items: center;
            gap: 4px;
            padding: 12px 16px;
            background-color: #e9ecef;
            border-radius: 15px 15px 15px 0px;
            width: fit-content;
            margin-bottom: 10px;
            align-self: flex-start;
        }

        .typing-dot {
            width: 6px;
            height: 6px;
            background-color: #6c757d;
            border-radius: 50%;
            animation: typingBlink 1.4s infinite ease-in-out both;
        }

        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes typingBlink {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold text-dark">AI Contact Assistant</h2>
            <a href="/dashboard/" class="btn btn-outline-primary">Back to Dashboard</a>
        </div>

        <div class="row justify-content-center">
            <div class="col-md-8">
                <div id="chat-box" class="d-flex flex-column mb-3 shadow-sm">
                    <div class="ai-msg shadow-sm">Hello! Ask me anything about the contacts you have scanned.</div>
                    
                    <div id="typingBubble" class="typing-indicator shadow-sm">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                </div>
                
                <form id="chat-form" class="d-flex gap-2">
                    {% csrf_token %}
                    <input type="text" id="message-input" class="form-control" placeholder="Ask your data..." required>
                    <button type="submit" class="btn btn-primary px-4">Send</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('chat-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const input = document.getElementById('message-input');
            const message = input.value;
            const chatBox = document.getElementById('chat-box');
            const typingBubble = document.getElementById('typingBubble');
            
            // 1. Append User Message
            const userDiv = document.createElement('div');
            userDiv.className = 'user-msg shadow-sm text-end';
            userDiv.textContent = message;
            
            // Insert user message *before* the typing bubble
            chatBox.insertBefore(userDiv, typingBubble);
            
            input.value = '';
            
            // 2. Show Typing Indicator
            typingBubble.style.display = 'inline-flex';
            chatBox.scrollTop = chatBox.scrollHeight;

            const formData = new FormData();
            formData.append('message', message);
            formData.append('csrfmiddlewaretoken', document.querySelector('[name=csrfmiddlewaretoken]').value);

            try {
                // 3. Make Request
                const response = await fetch('/chat/', { method: 'POST', body: formData });
                const data = await response.json();
                
                // 4. Hide Typing Indicator
                typingBubble.style.display = 'none';
                
                // 5. Append AI Response
                const aiDiv = document.createElement('div');
                aiDiv.className = 'ai-msg shadow-sm';
                aiDiv.textContent = data.answer || "Error processing request.";
                
                // Insert AI message *before* the typing bubble
                chatBox.insertBefore(aiDiv, typingBubble);
                chatBox.scrollTop = chatBox.scrollHeight;
                
            } catch (error) {
                console.error('Chat error:', error);
                typingBubble.style.display = 'none';
                
                const errorDiv = document.createElement('div');
                errorDiv.className = 'ai-msg shadow-sm text-danger';
                errorDiv.textContent = "Connection error. Ensure Ollama is running.";
                chatBox.insertBefore(errorDiv, typingBubble);
            }
        });
    </script>
</body>
</html>
