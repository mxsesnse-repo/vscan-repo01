<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Contact</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-white border-bottom-0 pt-4 pb-0 px-4">
                        <h3 class="fw-bold text-dark">Edit Contact Record</h3>
                    </div>
                    <div class="card-body p-4">
                        <form method="POST">
                            {% csrf_token %}
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label text-muted small fw-bold">First Name <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" name="first_name" value="{{ card.first_name|default:'' }}" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label text-muted small fw-bold">Last Name <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" name="last_name" value="{{ card.last_name|default:'' }}" required>
                                </div>
                                <div class="col-md-8">
                                    <label class="form-label text-muted small fw-bold">Company Name</label>
                                    <input type="text" class="form-control" name="company_name" value="{{ card.company_name|default:'' }}">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label text-muted small fw-bold">Contact Type</label>
                                    <select name="contact_type" class="form-select">
                                        <option value="customer" {% if card.contact_type == 'customer' %}selected{% endif %}>Customer</option>
                                        <option value="vendor" {% if card.contact_type == 'vendor' %}selected{% endif %}>Vendor</option>
                                        <option value="investor" {% if card.contact_type == 'investor' %}selected{% endif %}>Investor</option>
                                        <option value="partner" {% if card.contact_type == 'partner' %}selected{% endif %}>Partner</option>
                                        <option value="research" {% if card.contact_type == 'research' %}selected{% endif %}>Research</option>
                                        <option value="mentor" {% if card.contact_type == 'mentor' %}selected{% endif %}>Mentor</option>
                                        <option value="government" {% if card.contact_type == 'government' %}selected{% endif %}>Government</option>
                                        <option value="other" {% if card.contact_type == 'other' or not card.contact_type %}selected{% endif %}>Other</option>
                                    </select>
                                </div>
                                <div class="col-md-8">
                                    <label class="form-label text-muted small fw-bold">Designation / Title</label>
                                    <input type="text" class="form-control" name="designation" value="{{ card.designation|default:'' }}" placeholder="e.g., Senior Engineer">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label text-muted small fw-bold">Relationship Status</label>
                                    <select name="relationship_status" class="form-select">
                                        <option value="prospect" {% if card.relationship_status == 'prospect' or not card.relationship_status %}selected{% endif %}>Prospect</option>
                                        <option value="active" {% if card.relationship_status == 'active' %}selected{% endif %}>Active</option>
                                        <option value="dormant" {% if card.relationship_status == 'dormant' %}selected{% endif %}>Dormant</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label text-muted small fw-bold">Email Address</label>
                                    <input type="email" class="form-control" name="email" value="{{ card.email|default:'' }}">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label text-muted small fw-bold">Phone Number</label>
                                    <input type="text" class="form-control" name="phone_number" value="{{ card.phone_number|default:'' }}">
                                </div>
                                <div class="col-12">
                                    <label class="form-label text-muted small fw-bold">Website</label>
                                    <input type="text" class="form-control" name="website" value="{{ card.website|default:'' }}" placeholder="www.example.com">
                                </div>
                                <div class="col-12">
                                    <label class="form-label text-muted small fw-bold">Address</label>
                                    <textarea class="form-control" name="address" rows="2" placeholder="123 Main St, City, Country">{{ card.address|default:'' }}</textarea>
                                </div>
                                <div class="col-12">
                                    <label class="form-label text-muted small fw-bold">Manual Notes</label>
                                    <textarea class="form-control" name="manual_note" rows="3">{{ card.manual_note|default:'' }}</textarea>
                                </div>
                                
                                <div class="col-12 mt-3">
                                    <label class="form-label text-muted small fw-bold">Domain Tags (Hold Ctrl/Cmd to select multiple)</label>
                                    <select name="domains" class="form-select" multiple style="height: 100px;">
                                        {% for domain in domains %}
                                            <option value="{{ domain.id }}" 
                                                {% if domain in card.domains.all %}selected{% endif %}>
                                                {{ domain.name }}
                                            </option>
                                        {% endfor %}
                                    </select>
                                    <div class="form-text">Categorize this contact for the Knowledge Graph.</div>
                                </div>
                                
                                <hr class="my-4">
                                <h5 class="fw-bold text-dark mb-3">🤝 Relationship Pipeline</h5>
                                <div class="row g-3 mb-4">
                                    <div class="col-md-7">
                                        <label class="form-label text-muted small fw-bold">Project / Discussion Topic</label>
                                        <input type="text" class="form-control" name="opp_title" placeholder="e.g., Collaborative Project, Mentorship" value="{{ opportunity.title|default:'' }}">
                                    </div>
                                    <div class="col-md-5">
                                        <label class="form-label text-muted small fw-bold">Pipeline Stage</label>
                                        <select name="opp_stage" class="form-select">
                                            <option value="lead" {% if opportunity.stage == 'lead' %}selected{% endif %}>Lead</option>
                                            <option value="pitching" {% if opportunity.stage == 'pitching' %}selected{% endif %}>Pitching</option>
                                            <option value="negotiation" {% if opportunity.stage == 'negotiation' %}selected{% endif %}>Negotiation</option>
                                            <option value="closed_won" {% if opportunity.stage == 'closed_won' %}selected{% endif %}>Closed Won</option>
                                            <option value="closed_lost" {% if opportunity.stage == 'closed_lost' %}selected{% endif %}>Closed Lost</option>
                                        </select>
                                    </div>
                                </div>
                                
                            </div>
                            <div class="mt-4 d-flex gap-2">
                                <button type="submit" class="btn btn-primary px-4">Save Changes</button>
                                <a href="/dashboard/" class="btn btn-outline-secondary px-4">Cancel</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
