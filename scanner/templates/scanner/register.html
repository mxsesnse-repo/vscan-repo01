<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up - AI Card Scanner</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">
    <div class="card shadow p-5" style="width: 400px;">
        <h2 class="fw-bold text-center mb-4 text-success">Create Account</h2>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-success w-100 mt-3">Sign Up & Scan</button>
        </form>
        <p class="text-center mt-4 text-muted small">Already have an account? <a href="/login/">Log In</a></p>
    </div>
</body>
</html>
